name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 拉代码
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ---------- Go 环境 ----------
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Go build
        run: make build-shortvid-service

      # ---------- Node 环境 ----------
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # ---------- Semantic Release ----------
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -y -p semantic-release -p @semantic-release/changelog -p @semantic-release/git semantic-release

syntax = "proto3";

option go_package = "shortvid-backend/api/shortvid-service/v1;v1";
option java_multiple_files = true;
option java_package = "api.shortvid-service.v1";

import "google/api/annotations.proto";

service File {
	rpc UploadFile (UploadFileRequest) returns (UploadFileReply){
		option (google.api.http) = {
			post: "/api/v1/file/upload"
			body: "*"
		};
	};
	rpc DeleteFile (DeleteFileRequest) returns (DeleteFileReply);
	rpc GetFile (GetFileRequest) returns (GetFileReply);
	rpc ListFile (ListFileRequest) returns (ListFileReply);
}

message UploadFileRequest {}
message UploadFileReply {}

message UpdateFileRequest {}
message UpdateFileReply {}

message DeleteFileRequest {}
message DeleteFileReply {}

message GetFileRequest {}
message GetFileReply {}

message ListFileRequest {}
message ListFileReply {}
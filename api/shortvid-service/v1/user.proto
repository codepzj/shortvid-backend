syntax = "proto3";

option go_package = "shortvid-backend/api/shortvid-service/v1;v1";

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";

service UsersService {
    // firebase登录
    rpc LoginFirebase(LoginFirebaseRequest) returns (LoginFirebaseResponse){
        option (google.api.http) = {
            post: "/api/v1/login/firebase"
            body: "*"
        };    
    }
    // 通过userUid获取用户信息
    rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse){
        option (google.api.http) = {
            post: "/api/v1/user/profile"
            body: "*"
        };
    }
    // 获取自己的用户信息
    rpc UserInfo(google.protobuf.Empty) returns (UserInfoResponse){
        option (google.api.http) = {
            post: "/api/v1/user/info"
            body: "*"
        };
    }
}

message LoginFirebaseRequest {
    string idToken = 1;
}

message LoginFirebaseResponse {
    string accessToken = 1;
    string refreshToken = 2;
    UserProfile user = 3;
}

message UserProfile {
    int32 id = 1;
    int32 userUid = 2;
    string nickname = 3;
    string avatar = 4;
    string email = 5;
    string provider = 6;
    string providerUid = 7;
}

message GetUserProfileRequest {
    int32 userUid = 1;
}

message GetUserProfileResponse {
    UserProfile userInfo = 1;
}

message UserInfoResponse {
    UserProfile userInfo = 1;
}
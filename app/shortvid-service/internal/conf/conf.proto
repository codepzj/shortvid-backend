syntax = "proto3";
package kratos.api;

option go_package = "shortvid-backend/app/shortvid-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Log log = 3;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    google.protobuf.Duration slow_sql_threshold = 3;
    string log_level = 4;
    string log_format = 5;
    string log_file = 6;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    string password = 3;
    google.protobuf.Duration read_timeout = 4;
    google.protobuf.Duration write_timeout = 5;
  }
  Database database = 1;
  Redis redis = 2;
}

message Log {
  string format = 1;
  string level = 2;
  string full_log_filename = 3;
  string error_log_filename = 4;
  int32 max_size = 5;
  int32 max_backups = 6;
  int32 max_age = 7;
  bool compress = 8;
}
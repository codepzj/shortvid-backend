syntax = "proto3";
package kratos.api;

option go_package = "shortvid-backend/app/shortvid-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Firebase firebase = 3;
  Github github = 4;
  Jwt jwt = 5;
  Session session = 6;
  S3 s3 = 7;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Mysql {
    string dsn = 1;
    google.protobuf.Duration slow_sql_threshold = 2;
    int64 max_open_conns = 3;
    int64 max_idle_conns = 4;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    string password = 3;
    int32 db = 4;
    string key_prefix = 5;
    google.protobuf.Duration read_timeout = 6;
    google.protobuf.Duration write_timeout = 7;
  }
  Mysql mysql = 1;
  Redis redis = 2;
}

message Firebase {
  string credentials_json = 1;
}

message Github {
  string client_id = 1;
  string client_secret = 2;
}

message Jwt {
  string issuer = 1;
  string secret_key = 2;
  google.protobuf.Duration access_token_expires_in = 3;
  google.protobuf.Duration refresh_token_expires_in = 4;
}

message Session {
  bool http_only = 1;
  bool secure = 2;
  bool limit_enabled = 3;
  int32 limit_count = 4;
}

message S3 {
  string endpoint = 1;
  string s3_access_key = 2;
  string s3_secret_key = 3;
  string region = 4;
  bool use_path_style = 5;
  string sts_access_key = 6;
  string sts_secret_key = 7;
  string sts_role_arn = 8;
  string sts_session_name = 9;
  string sts_policy = 10;
  int32 sts_duration_seconds = 11;
}
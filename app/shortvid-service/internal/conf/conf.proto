syntax = "proto3";
package kratos.api;

import "google/protobuf/duration.proto";

option go_package = "shortvid-backend/app/shortvid-service/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  S3 s3 = 3;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
}

message Data {
  message Mysql {
    string dsn = 1;
    google.protobuf.Duration slow_sql_threshold = 2;
    int64 max_open_conns = 3;
    int64 max_idle_conns = 4;
  }
  Mysql mysql = 1;
}

message S3 {
  string endpoint = 1;
  string bucket = 2;
  string s3_access_key = 3;
  string s3_secret_key = 4;
  string region = 5;
  bool use_path_style = 6;
  string sts_access_key = 7;
  string sts_secret_key = 8;
  string sts_role_arn = 9;
  string sts_session_name = 10;
  int32 sts_duration_seconds = 11;
}

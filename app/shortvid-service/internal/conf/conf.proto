syntax = "proto3";
package kratos.api;

option go_package = "shortvid-backend/app/shortvid-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Firebase firebase = 3;
  Github github = 4;
  Jwt jwt = 5;
  Session session = 6;
  Minio minio = 7;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    google.protobuf.Duration slow_sql_threshold = 3;
    string log_level = 4;
    string log_format = 5;
    string log_file = 6;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    string password = 3;
    int32 db = 4;
    string key_prefix = 5;
    google.protobuf.Duration read_timeout = 6;
    google.protobuf.Duration write_timeout = 7;
  }
  Database database = 1;
  Redis redis = 2;
}

message Firebase {
  string credentials_json = 1;
}

message Github {
  string client_id = 1;
  string client_secret = 2;
}

message Jwt {
  string issuer = 1;
  string secret_key = 2;
  google.protobuf.Duration access_token_expires_in = 3;
  google.protobuf.Duration refresh_token_expires_in = 4;
}

message Session {
  bool http_only = 1;
  bool secure = 2;
  bool limit_enabled = 3;
  int32 limit_count = 4;
}

message Minio {
  string endpoint = 1;
  string accessKey = 2;
  string secretKey = 3;
  bool useSSL = 4;
}